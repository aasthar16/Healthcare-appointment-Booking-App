services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: healthcare
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"